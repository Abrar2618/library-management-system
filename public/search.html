<!DOCTYPE html>
<html>

<head>
    <title>Search Books</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Search Books</h1>

    <input type="text" id="searchBox" placeholder="Enter title or author">
    <button onclick="searchBook()">Search</button>

    <table border="1" style="margin:50px auto; width:80%;">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
        </tr>
        <tbody id="results"></tbody>
    </table>

    <script>

        function searchBook() {

            const q = document.getElementById('searchBox').value;

            fetch(`/search?q=${q}`)
            .then(res => res.json())
            .then(data => {

                let output = "";

                data.forEach(book => {

                    output += `
                        <tr>
                            <td>${book.id}</td>
                            <td>${book.title}</td>
                            <td>${book.author}</td>
                            <td>${book.price}</td>
                        </tr>
                    `;
                });

                document.getElementById('results').innerHTML = output;
            });
        }

    </script>

</body>

</html>
