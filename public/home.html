<!DOCTYPE html>
<html>

<head>
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .container {
            margin-top: 80px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 30px;
            margin: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            font-size: 18px;
            color: black;
            display: block;
            margin-top: 10px;
        }

        h1 {
            background: #333;
            color: white;
            padding: 20px;
            margin: 0;
        }
    </style>
</head>

<body>

    <h1>Library Management System</h1>

    <div class="container">

        <div class="card">
            <h3>➕ Add Book</h3>
            <a href="/index.html">Open</a>
        </div>

        <div class="card">
            <h3>📚 View Books</h3>
            <a href="/books.html">Open</a>
        </div>

        <div class="card">
            <h3>🔍 Search</h3>
            <a href="/search.html">Open</a>
        </div>

    </div>

</body>

</html>
