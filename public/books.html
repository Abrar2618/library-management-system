<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Books</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            background: #333;
            color: white;
            padding: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background: #444;
            color: white;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            color: white;
        }

        .delete { background: red; }
        .edit { background: orange; }
    </style>
</head>

<body>

<div class="container">
    <h2>All Books</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="bookTable">
            <!-- DATA WILL LOAD HERE -->
        </tbody>
    </table>
</div>

<script>
    let books = JSON.parse(localStorage.getItem("books")) || [];

    let table = document.getElementById("bookTable");

    function loadBooks() {
        table.innerHTML = "";

        books.forEach((book, index) => {
            table.innerHTML += `
                <tr>
                    <td>${book.id}</td>
                    <td>${book.title}</td>
                    <td>${book.author}</td>
                    <td>${book.price}</td>
                    <td>
                        <button class="btn delete" onclick="deleteBook(${index})">Delete</button>
                        <button class="btn edit">Edit</button>
                    </td>
                </tr>
            `;
        });
    }

    function deleteBook(index) {
        books.splice(index, 1);
        localStorage.setItem("books", JSON.stringify(books));
        loadBooks();
    }

    loadBooks();
</script>

</body>
</html>
