<h2>Books List</h2>
<div id="list"></div>

<script>
fetch('/books')
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(b => {
        html += `
        <div>
            <h3>${b.title}</h3>
            <p>${b.author}</p>
            <p>${b.price}</p>
            <a href="/delete/${b.id}">Delete</a>
        </div>
        <hr>
        `;
    });
    document.getElementById("list").innerHTML = html;
});
</script>
