<!DOCTYPE html>
<html>

<head>
    <title>Library Books</title>
    <link rel="stylesheet" href="style.css">

    <style>
        table {
            width: 85%;
            margin: 40px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 10px #ccc;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        a {
            text-decoration: none;
            padding: 5px 10px;
            margin: 2px;
            display: inline-block;
            border-radius: 5px;
        }

        .delete {
            background: red;
            color: white;
        }

        .edit {
            background: orange;
            color: white;
        }
    </style>
</head>

<body>

    <h1>All Books</h1>

    <table id="bookTable">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
    </table>

    <script>

        fetch('/books')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById('bookTable');

            data.forEach(book => {

                let row = table.insertRow();

                row.innerHTML = `
                    <td>${book.id}</td>
                    <td>${book.title}</td>
                    <td>${book.author}</td>
                    <td>${book.price}</td>
                    <td>
                        <a class="delete" href="/delete/${book.id}">Delete</a>
                        <a class="edit" href="/edit.html?id=${book.id}">Edit</a>
                    </td>
                `;
            });

        });

    </script>

</body>

</html>
